[build]
  command = "npm run build"
  publish = ".output/public"
  functions = ".output/server"

# Netlify will respect this file automatically. If you connect this GitHub repo in Netlify,
# the build command and publish directory are set from here.

[context.production.environment]
  # Pin a Node version if you want; Netlify will use your project's default otherwise.
  NODE_VERSION = "18"
